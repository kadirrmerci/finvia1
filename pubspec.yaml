name: finvia
description: "Finvia - Akıllı Yaşam Asistanı"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.2   
  provider: ^6.1.5+1
  sqflite: ^2.4.2+1
  path: ^1.9.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  uuid: ^4.5.3
  http: ^1.6.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  package_info_plus: ^10.1.0
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter_native_splash:
  background_image: assets/splash/splash_logo.png
  fullscreen: true
  android_gravity: fill
  ios_content_mode: scaleAspectFill
  background_image_dark: assets/splash/splash_logo.png
  android_12:
    image: assets/splash/splash_logo.png
    color: "#82BE33"
    image_dark: assets/splash/splash_logo.png
    color_dark: "#82BE33"

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
